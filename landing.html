<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ouvrir l’invitation</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Great+Vibes&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    :root{
      --navy:#08152a;
      --navy-soft:#13294a;
      --gold:#d8b15a;
      --gold-soft:#f2dfae;
      --cream:#f8f2e8;
      --cream-2:#efe6d6;
      --text:#2b3545;
      --shadow:0 20px 60px rgba(0,0,0,.18);
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    html, body{
      width:100%;
      min-height:100%;
      overflow:hidden;
    }

    body{
      font-family:"Montserrat", sans-serif;
      position:relative;
      display:flex;
      align-items:center;
      justify-content:center;
      background:
        radial-gradient(circle at top, rgba(255,255,255,.85), transparent 30%),
        linear-gradient(135deg, #f8f2e8 0%, #efe6d6 50%, #f9f5ee 100%);
      color:var(--text);
    }

    body::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at 15% 20%, rgba(216,177,90,.10), transparent 18%),
        radial-gradient(circle at 85% 18%, rgba(8,21,42,.06), transparent 18%),
        radial-gradient(circle at 20% 80%, rgba(8,21,42,.05), transparent 20%),
        radial-gradient(circle at 80% 75%, rgba(216,177,90,.08), transparent 20%);
      pointer-events:none;
    }

    .sparkle{
      position:absolute;
      width:8px;
      height:8px;
      border-radius:50%;
      background:radial-gradient(circle, #fff, var(--gold-soft));
      box-shadow:0 0 18px rgba(216,177,90,.45);
      opacity:.55;
      animation:float 5s ease-in-out infinite;
    }

    .sparkle.s1{ top:14%; left:18%; animation-delay:0s; }
    .sparkle.s2{ top:22%; right:20%; animation-delay:1.2s; }
    .sparkle.s3{ bottom:18%; left:22%; animation-delay:2.2s; }
    .sparkle.s4{ bottom:14%; right:18%; animation-delay:3s; }
    .sparkle.s5{ top:50%; left:10%; animation-delay:1.7s; }
    .sparkle.s6{ top:56%; right:9%; animation-delay:.5s; }

    @keyframes float{
      0%,100%{ transform:translateY(0) scale(1); opacity:.35; }
      50%{ transform:translateY(-10px) scale(1.2); opacity:.9; }
    }

    .landing-wrap{
      position:relative;
      z-index:2;
      width:min(92%, 920px);
      text-align:center;
      padding:30px 20px;
    }

    .mini{
      display:inline-block;
      margin-bottom:16px;
      color:#9a7a3e;
      letter-spacing:2.4px;
      font-size:.78rem;
      text-transform:uppercase;
      font-weight:700;
    }

    .title{
      font-family:"Great Vibes", cursive;
      font-size:clamp(3rem, 7vw, 5.6rem);
      line-height:.95;
      color:var(--navy);
      margin-bottom:10px;
    }

    .subtitle{
      font-family:"Cormorant Garamond", serif;
      font-size:clamp(1.15rem, 2.8vw, 1.65rem);
      color:#5e6777;
      margin-bottom:34px;
    }

    .envelope-stage{
      position:relative;
      width:min(100%, 640px);
      margin:0 auto;
      padding:18px;
    }

    .envelope-click{
      position:relative;
      width:100%;
      background:rgba(255,255,255,.55);
      border:1px solid rgba(8,21,42,.08);
      border-radius:34px;
      box-shadow:var(--shadow);
      backdrop-filter:blur(8px);
      padding:28px;
      cursor:pointer;
      transition:transform .35s ease, box-shadow .35s ease, opacity .6s ease;
      overflow:hidden;
    }

    .envelope-click:hover{
      transform:translateY(-4px) scale(1.01);
      box-shadow:0 26px 70px rgba(0,0,0,.20);
    }

    .envelope-click::before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(180deg, rgba(255,255,255,.45), transparent 34%);
      pointer-events:none;
    }

    .envelope-img{
      width:100%;
      max-width:560px;
      margin:0 auto;
      object-fit:contain;
      filter:drop-shadow(0 14px 26px rgba(8,21,42,.15));
      transition:transform .8s ease, filter .8s ease, opacity .6s ease;
      position:relative;
      z-index:2;
    }

    .cta-note{
      margin-top:20px;
      font-size:.95rem;
      color:#6b7280;
      letter-spacing:.3px;
    }

    .names{
      margin-top:18px;
      font-family:"Cormorant Garamond", serif;
      font-size:1.25rem;
      color:var(--navy-soft);
      font-weight:600;
    }

    .open .envelope-img{
      transform:scale(1.08) translateY(-8px);
      filter:drop-shadow(0 20px 36px rgba(216,177,90,.28));
    }

    .fade-out{
      opacity:0;
      transform:scale(1.04);
      transition:opacity .9s ease, transform .9s ease;
    }

    .screen-fade{
      position:fixed;
      inset:0;
      background:linear-gradient(180deg, rgba(8,21,42,0), rgba(8,21,42,.96));
      opacity:0;
      pointer-events:none;
      transition:opacity .9s ease;
      z-index:9;
    }

    .screen-fade.show{
      opacity:1;
    }

    @media (max-width: 640px){
      .landing-wrap{
        padding:20px 14px;
      }

      .subtitle{
        margin-bottom:24px;
      }

      .envelope-click{
        padding:18px;
        border-radius:24px;
      }

      .cta-note{
        font-size:.88rem;
      }

      .names{
        font-size:1.08rem;
      }
    }
  </style>
</head>
<body>
  <span class="sparkle s1"></span>
  <span class="sparkle s2"></span>
  <span class="sparkle s3"></span>
  <span class="sparkle s4"></span>
  <span class="sparkle s5"></span>
  <span class="sparkle s6"></span>

  <div class="landing-wrap">
    <div class="mini">Invitation digitale</div>
    <h1 class="title">Stéphane &amp; Cindria</h1>
    <p class="subtitle">Une enveloppe. Un clic. Et le début de notre plus beau jour.</p>

    <div class="envelope-stage">
      <div class="envelope-click" id="envelopeTrigger">
        <img src="enveloppe.png" alt="Enveloppe d’invitation" class="envelope-img">
        <div class="names">Cliquer pour ouvrir l’invitation</div>
        <div class="cta-note">Vous serez redirigé vers l’invitation principale</div>
      </div>
    </div>
  </div>

  <div class="screen-fade" id="screenFade"></div>

  <script>
    const envelopeTrigger = document.getElementById("envelopeTrigger");
    const screenFade = document.getElementById("screenFade");
    let alreadyOpened = false;

    envelopeTrigger.addEventListener("click", () => {
      if (alreadyOpened) return;
      alreadyOpened = true;

      envelopeTrigger.classList.add("open");

      setTimeout(() => {
        envelopeTrigger.classList.add("fade-out");
        screenFade.classList.add("show");
      }, 500);

      setTimeout(() => {
        window.location.href = "index.html";
      }, 1400);
    });
  </script>
</body>
</html>
